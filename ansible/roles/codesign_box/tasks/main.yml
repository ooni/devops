---
- name: Create .ssh/authorized_keys in ubuntu home
  ansible.builtin.template:
    src: authorized_keys
    dest: "/home/ubuntu/.ssh/authorized_keys"
    owner: "ubuntu"
    mode: "0400"
  tags: codesign

- name: Install cloudhsm-cli
  ansible.builtin.apt:
    deb: https://s3.amazonaws.com/cloudhsmv2-software/CloudHsmClient/Jammy/cloudhsm-cli_latest_u22.04_amd64.deb
    update_cache: true
  tags: codesign

- name: Install cloudhsm-pkcs11
  ansible.builtin.apt:
    deb: https://s3.amazonaws.com/cloudhsmv2-software/CloudHsmClient/Jammy/cloudhsm-pkcs11_latest_u22.04_amd64.deb
  tags: codesign

- name: Install cloudhsm-pkcs11
  ansible.builtin.apt:
    name:
      - libengine-pkcs11-openssl
      - awscli
  tags: codesign

- name: Check if osslsigncode is already installed
  ansible.builtin.command: which osslsigncode
  register: osslsigncode_check
  failed_when: false
  changed_when: false
  tags: codesign
- name: Build and install osslsigncode from source
  when: osslsigncode_check.rc != 0
  tags: codesign
  block:
    - name: Install osslsigncode build dependencies
      ansible.builtin.apt:
        name:
          - cmake
          - libssl-dev
          - libcurl4-openssl-dev
          - zlib1g-dev
          - python3
          - git
        state: present
        update_cache: true
      tags: codesign

    - name: Download osslsigncode release tarball
      ansible.builtin.get_url:
        url: https://github.com/mtrojnar/osslsigncode/archive/refs/tags/2.13.tar.gz
        dest: /tmp/osslsigncode.tar.gz
        mode: "0644"
      tags: codesign

    - name: Extract osslsigncode tarball
      ansible.builtin.unarchive:
        src: /tmp/osslsigncode.tar.gz
        dest: /tmp/
        remote_src: true
      tags: codesign

    - name: Create build directory
      ansible.builtin.file:
        path: /tmp/osslsigncode/build
        state: directory
        mode: "0755"
      tags: codesign

    - name: Configure osslsigncode with CMake
      ansible.builtin.command:
        cmd: cmake -S .. -DCMAKE_BUILD_TYPE=Release
        chdir: /tmp/osslsigncode/build
      changed_when: true
      tags: codesign

    - name: Build osslsigncode
      ansible.builtin.command:
        cmd: cmake --build . --parallel
        chdir: /tmp/osslsigncode/build
      changed_when: true
      tags: codesign

    - name: Install osslsigncode
      ansible.builtin.command:
        cmd: cmake --install .
        chdir: /tmp/osslsigncode/build
      changed_when: true
      tags: codesign

    - name: Clean up build directory
      ansible.builtin.file:
        path: /tmp/osslsigncode
        state: absent
      tags: codesign

- name: Write customerCA.crt
  ansible.builtin.template:
    src: customerCA.crt
    dest: /opt/cloudhsm/etc/customerCA.crt
    owner: root
    group: adm
    mode: "u=rwx,g=rx"
  tags: codesign

- name: Write Cert_bundle.pem
  ansible.builtin.template:
    src: Cert_bundle.pem
    dest: /opt/cloudhsm/etc/Cert_bundle.pem
    owner: root
    group: adm
    mode: "u=rwx,g=rx"
  tags: codesign

- name: Write delete-hsms.sh command
  ansible.builtin.template:
    src: delete-hsms.sh
    dest: /usr/bin/delete-hsms.sh
    owner: root
    group: adm
    mode: "u=rwx,g=rx"
  tags: codesign

- name: Write create-hsms.sh command
  ansible.builtin.template:
    src: create-hsms.sh
    dest: /usr/bin/create-hsms.sh
    owner: root
    group: adm
    mode: "u=rwx,g=rx"
  tags: codesign

- name: Ensure .hsmcredentials file exists
  ansible.builtin.copy:
    dest: /home/ubuntu/.hsmcredentials
    content: |
      HSM_CREDENTIALS=
    owner: ubuntu
    group: adm
    mode: "u=rw,g=,o="
    force: false
  tags: codesign

- name: Write sign-windows-exe.sh command
  ansible.builtin.template:
    src: sign-windows-exe.sh
    dest: /usr/bin/sign-windows-exe.sh
    owner: root
    group: adm
    mode: "u=rwx,g=rx"
  tags: codesign

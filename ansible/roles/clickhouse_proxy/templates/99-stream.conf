stream {
    upstream clickhouse_backend {
{% for n in clickhouse_nodes %}
        # node {{ loop.index }}{% if n.backup is defined and n.backup %} (backup){% endif %}
        server {{ n.host }}:{{ n.port | default(clickhouse_port) }} max_fails=3 fail_timeout=60s{% if n.backup is defined and n.backup %} backup{% endif %};
{% endfor %}
    }

    server {
        listen {{ proxy_listen_port | default(9000) }};

        proxy_connect_timeout 3s;
        proxy_timeout 600s; # kill idle connections after 10 minutes
        proxy_pass clickhouse_backend;
    }

    error_log /var/log/nginx/error.log;
}
